description: >-
  FinOps view of Freeplay spend. Freeplay is sold as sales-led, packaged
  subscriptions (Free/Starter, Growth, Enterprise) rather than published
  per-unit usage rates, so spend is primarily a fixed/contracted platform cost
  scaled by seats, volume, support, and deployment (cloud vs. self-hosted).
  Underlying LLM inference costs are incurred separately at the model
  providers, since Freeplay records completions rather than proxying inference.
notes: >-
  Per-plan dollar amounts are not publicly listed; reconciled is false. Confirm
  contracted package, seat counts, and volume bands with Freeplay sales. Track
  model-provider inference spend separately from the Freeplay platform fee.
