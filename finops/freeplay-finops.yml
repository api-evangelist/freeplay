meters:
- name: platform_subscription
  description: Contracted platform subscription fee for the selected plan/package.
  unit: contract
  aggregation: sum
  dimensions:
  - account
  - plan
- name: seats
  description: Number of collaborator seats / users on the account.
  unit: seats
  aggregation: max
  dimensions:
  - account
  - plan
- name: recorded_completions
  description: Volume of completions/sessions/traces recorded into Freeplay, which may inform plan volume bands.
  unit: completions
  aggregation: sum
  dimensions:
  - account
  - project
- name: test_runs
  description: Batch test runs / evaluation jobs executed, which may inform plan volume bands.
  unit: runs
  aggregation: sum
  dimensions:
  - account
  - project
principles:
- name: Visibility
  description: Track the Freeplay platform fee separately from model-provider inference spend; tag projects and API keys per team.
- name: Allocation
  description: Map projects and seats to internal cost centers; attribute recording and evaluation volume per product.
- name: Optimization
  description: Right-size the plan to actual recording and evaluation volume; consolidate projects; use search and statistics endpoints instead of bulk exports where possible.
- name: Accountability
  description: Assign owners per project; review contracted volume bands and seat usage against the agreement at renewal.
