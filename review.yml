aid: freeplay
name: Freeplay
review:
  question: Does Freeplay expose a documented public WebSocket or streaming (SSE) API?
  answer: false
  date: '2026-06-20'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was created. Freeplay's HTTP API is a synchronous
    REST recording/evaluation/observability API: applications fetch prompt
    templates, make their own LLM calls (against their chosen model provider),
    and record completions, sessions, and traces back to Freeplay over plain
    HTTPS request/response. No WebSocket (ws://, wss://) and no Server-Sent
    Events (SSE) streaming surface is documented in the Freeplay API reference,
    so there is no event-driven transport to model in AsyncAPI.
findings:
  summary: |
    Freeplay does not publish a documented public WebSocket or SSE API. The
    platform's HTTP API is rooted at the instance URL plus /api/v2 (cloud:
    https://app.freeplay.ai/api/v2; private/self-hosted:
    https://{subdomain}.freeplay.ai/api/v2) and is authenticated with a
    Bearer API key. All documented endpoints are synchronous HTTPS REST for
    prompt templates, completions/sessions/traces recording, datasets/test
    cases, test runs, feedback, search, projects, and agents. Freeplay does
    not proxy LLM inference, so there is no token-streaming transport on its
    side; any streaming happens between the customer's app and the model
    provider, outside Freeplay's API.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://app.freeplay.ai/api/v2
      documented: true
    - protocol: REST
      scheme: https
      baseURL: https://{subdomain}.freeplay.ai/api/v2
      note: Per-account subdomain for private / self-hosted instances.
      documented: true
    - protocol: SSE
      scheme: https
      documented: false
      note: No Server-Sent Events streaming endpoint is documented.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented in the Freeplay API reference.
  endpointsConfirmedRest:
