sources:
  - url: https://docs.freeplay.ai/developer-resources/api-reference
    type: APIReference
    note: Full HTTP API reference; all endpoints are HTTPS REST under /api/v2. No WebSocket or SSE mentioned.
  - url: https://docs.freeplay.ai/docs/api-reference
    type: APIReference
    note: Mirror of the API reference confirming the same REST endpoints, Bearer auth, and v2 version.
  - url: https://docs.freeplay.ai/getting-started/integrate
    type: Documentation
    note: Integration guide; apps fetch prompts, call the LLM themselves, and record results back to Freeplay over REST.
  - url: https://docs.freeplay.ai/docs/freeplay-sdk
    type: Documentation
    note: SDK reference (Python, Node.js, JVM) wrapping the same REST API; no streaming transport exposed by Freeplay.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or SSE protocol surface exists in Freeplay's documented API,
    so no AsyncAPI document was authored. The apis.yml catalogs the four REST
    sub-API groupings (Prompt Templates; Recordings & Sessions; Test Cases &
    Datasets; Test Runs & Evaluations) with an OpenAPI 3.0.1 definition.
