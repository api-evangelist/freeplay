    - GET  https://app.freeplay.ai/api/v2/projects/{project_id}/prompt-templates/all/{environment_name}
    - POST https://app.freeplay.ai/api/v2/projects/{project_id}/prompt-templates/name/{template_name}
    - POST https://app.freeplay.ai/api/v2/projects/{project_id}/prompt-templates/name/{template_name}/versions
    - POST https://app.freeplay.ai/api/v2/projects/{project_id}/prompt-templates/id/{template_id}/versions
    - POST https://app.freeplay.ai/api/v2/projects/{project_id}/prompt-templates/id/{template_id}/versions/{version_id}
    - POST https://app.freeplay.ai/api/v2/projects/{project_id}/prompt-templates/id/{template_id}/versions/{version_id}/environments
    - GET  https://app.freeplay.ai/api/v2/projects/{project_id}/sessions
