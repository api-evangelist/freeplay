    - GET  https://app.freeplay.ai/api/v2/projects/{project_id}/test-runs
    - POST https://app.freeplay.ai/api/v2/projects/{project_id}/test-runs
    - GET  https://app.freeplay.ai/api/v2/projects/{project_id}/test-runs/id/{test_run_id}
